<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Add products</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container mt-5">
    <div class="card">
        <div class="card-header" th:if="${mode=='new'}"> Add products </div>
        <div class="card-header" th:if="${mode=='edit'}">Update of products </div>
        <div class="card-body">
            <form th:action="@{saveProduct}" method="post">

                <input hidden name="page" class="form-control" th:value="${page}" />
                <input hidden name="size" class="form-control" th:value="${size}" />

                <div class="form-group">
                    <label class="control-label" hidden>ID Product :</label>
                    <input type="hidden" name="idProduct" class="form-control" th:value="${product.idProduct}"  />
                </div>
                <div class="form-group">
                    <label class="control-label">Product Name :</label>
                    <input type="text" name="nameProduct" class="form-control" th:value="${product.nameProduct}"  />
                    <span th:errors= ${product.nameProduct} class="text-danger"> </span>
                </div>
                <div class="form-group">
                    <label class="control-label">Product Price :</label>
                    <input type="text" name="priceProduct" class="form-control" th:value="${product.priceProduct}" />
                    <span th:errors=${product.priceProduct} class="text-danger"> </span>
                </div>
                <div class="form-group">
                    <label class="control-label">Creation Date :</label>
                    <input type="date" name="creationDate" class="form-control"  th:value="${product.creationDate}"/>
                    <span th:errors=${product.creationDate} class="text-danger"> </span>
                </div>

                <div class="form-group">
                    <label class="control-label">Category :</label>
                    <select
                            name="category" class="form-control"
                            th:value="${product.category.idCategory}"
                            th:if="${!#strings.isEmpty(product.category)}">
                        <option th:each="c:${category}" th:if="${mode=='edit'}"
                                th:value="${c.idCategory}" th:text="${c.nameCategory}"
                                th:selected="${ c.idCategory==product.category.idCategory}">
                        </option>
                    </select>
                    <!-- if it is an addition (mode==new) or a modification of a product with a null category -->
                    <select name="category" class="form-control"
                            th:if="${#strings.isEmpty(product.category)}">
                        <option th:each="c:${categories}" th:value="${c.idCategory}"
                                th:text="${c.nameCategory}"></option>
                    </select>
                </div>


                <div>
                    <button type="submit" class="btn btn-primary">Validate</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
